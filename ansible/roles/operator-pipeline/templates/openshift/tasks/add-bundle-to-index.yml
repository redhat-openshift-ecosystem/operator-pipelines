---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: add-bundle-to-index
spec:
  params:
    - name: pipeline_image
      description: The common pipeline image.

    - name: bundle_pullspec
      description: Bundle pullspec

    - name: index_images
      description: All known supported index image pull specs (space separated)

    - name: iib_url
      description: IIB API url
      default: https://iib.engineering.redhat.com

    - name: kerberos_keytab_secret_name
      description: >-
        The name of the Kubernetes Secret that contains the kerberos keytab for submitting IIB builds.

    - name: kerberos_keytab_secret_key
      description: >-
        The key within the Kubernetes Secret that contains the kerberos keytab for submitting IIB builds.

    - name: environment
      description: |
        Which environment the pipeline is running in. Can be one of [dev, qa, stage, prod]

    - name: index-image-destination
      default: ""
      description: "The destination registry and repository where index images will be pushed after IIB build is finished"

    - name: index-image-destination-tag-suffix
      default: ""
      description: "A tag suffix that is added to an image tag in destination registry"

    - name: upgrade-graph-mode
      default: ""
      description: "A graph update mode that defines how channel graphs are updated"

    - name: build_tags_suffix
      default: ""
      description: |
        Timestamp suffix for build tags (used with overwrite to ensure consistent tagging with publish task).

  results:
    - name: status
      description: Indicates a status of adding a bundle to an index
  volumes:
    - name: kerberos-volume
      secret:
        secretName: "$(params.kerberos_keytab_secret_name)"
  workspaces:
    - name: output
    - name: credentials
      optional: true
    - name: iib-credentials
      description: |
        Optional workspace containing Quay credentials for IIB to authenticate and overwrite from_index.
        Required for release pipeline to enable IIB to push to pending repositories.
        Expected to contain 'username' and 'password' files.
      optional: true

  steps:
    - name: add-bundle-to-index
      image: "$(params.pipeline_image)"
      workingDir: $(workspaces.output.path)
      env:
        - name: KRB_KEYTAB_FILE
          value: "/etc/kerberos/$(params.kerberos_keytab_secret_key)"
      volumeMounts:
        - name: kerberos-volume
          readOnly: true
          mountPath: "/etc/kerberos"
      script: |
        #! /usr/bin/env bash
        # DO NOT USE set -x to avoid revealing credentials in logs!
        set -e

        INDEX_IMAGES="$(params.index_images)"

        EXTRA_ARGS=""
        if [[ "$(workspaces.credentials.bound)" == "true" ]]; then
          EXTRA_ARGS+=" --authfile $(workspaces.credentials.path)/.dockerconfigjson"
        fi

        if [[ "$(params.index-image-destination-tag-suffix)" != "" ]]; then
          EXTRA_ARGS+=" --index-image-destination-tag-suffix=$(params.index-image-destination-tag-suffix)"
        fi

        if [[ "$(params.upgrade-graph-mode)" != "" ]]; then
          EXTRA_ARGS+=" --mode $(params.upgrade-graph-mode)"
        fi

        # Add IIB overwrite token if credentials workspace is provided (for release pipeline)
        if [[ "$(workspaces.iib-credentials.bound)" == "true" ]]; then
          IIB_QUAY_USER=$(cat $(workspaces.iib-credentials.path)/username)
          IIB_QUAY_TOKEN=$(cat $(workspaces.iib-credentials.path)/password)
          export IIB_OVERWRITE_TOKEN="${IIB_QUAY_USER}:${IIB_QUAY_TOKEN}"

          # Add build tags suffix for consistent tagging with publish task
          if [[ "$(params.build_tags_suffix)" != "" ]]; then
            EXTRA_ARGS+=" --build-tags-suffix $(params.build_tags_suffix)"
          fi
        fi

        # DO NOT use `--verbose` to avoid auth headers appearing in logs
        index \
          --iib-url "$(params.iib_url)" \
          --indices $INDEX_IMAGES \
          --bundle-pullspec "$(params.bundle_pullspec)" \
          --index-image-destination "$(params.index-image-destination)" \
          --image-output index-image-paths.txt $EXTRA_ARGS


        echo -n "success" | tee "$(results.status.path)"
        echo
        cat index-image-paths.txt
        echo

        # WORKAROUND: Manually overwriting index images using skopeo (TODO: remove when overwrite token is fixed)
        if [[ "$(workspaces.iib-credentials.bound)" == "true" ]]; then
          TEMP_IMAGES=$(cat index-image-paths.txt | tr "," " ")
          for i in $TEMP_IMAGES
          do
            SRC_IMAGE=$(echo $i | awk -F '+' '{print $2}')
            DEST_IMAGE=$(echo $i | awk -F '+' '{print $1}')
            echo "1. Version tag: copying $SRC_IMAGE to $DEST_IMAGE"
            skopeo copy --retry-times 5 --format v2s2 --all --src-no-creds \
              --dest-creds $IIB_QUAY_USER:$IIB_QUAY_TOKEN \
              docker://$SRC_IMAGE \
              docker://$DEST_IMAGE

            # Also copy with permanent tag if build_tags_suffix is set
            if [[ "$(params.build_tags_suffix)" != "" ]]; then
              DEST_IMAGE_PERMANENT="${DEST_IMAGE}-$(params.build_tags_suffix)"
              echo "2. Permanent tag: copying $SRC_IMAGE to $DEST_IMAGE_PERMANENT"
              skopeo copy --retry-times 5 --format v2s2 --all --src-no-creds \
                --dest-creds $IIB_QUAY_USER:$IIB_QUAY_TOKEN \
                docker://$SRC_IMAGE \
                docker://$DEST_IMAGE_PERMANENT
            fi
          done
        fi
