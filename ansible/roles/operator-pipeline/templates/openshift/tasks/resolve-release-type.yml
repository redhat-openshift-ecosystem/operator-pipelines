---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: resolve-release-type
spec:
  description: |-
    Depending on the change set and on the FBC onboarding status of the affected operator, infer what tasks
    this pipeline is expected to perform
  params:
    - name: bundle_path
    - name: affected_catalogs
    - name: affected_catalog_operators
    - name: fbc-enabled
  results:
    - name: add-bundle
    - name: update-catalog
  steps:
    - name: evaluate-conditions
      image: "$(params.pipeline_image)"
      script: |
        #! /usr/bin/env bash
        set -xe

        if [ "$(params.fbc-enabled)" == "true" ] ; then
          if [ -n "$(params.bundle_path)" ] ; then
            echo -n true >"$(results.add-bundle.path)"
          else
            echo -n false >"$(results.add-bundle.path)"
          fi
          if [ -n "$(params.affected_catalogs)" ] || [ -n "$(params.affected_catalogs)" ] ; then
            echo -n true >"$(results.update-catalog.path)"
          else
            echo -n false >"$(results.update-catalog.path)"
          fi
        else
          if [ -n "$(params.bundle_path)" ] ; then
            echo -n true >"$(results.add-bundle.path)"
            echo -n true >"$(results.update-catalog.path)"
          else
            echo -n false >"$(results.add-bundle.path)"
            echo -n false >"$(results.update-catalog.path)"
          fi
        fi
